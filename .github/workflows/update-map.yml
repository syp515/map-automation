name: Weekly Map Data Update (Per Province)

on:
  schedule:
    # 每周日凌晨 2:00 运行
    - cron: '0 2 * * 0'
  workflow_dispatch:   # 允许手动触发

jobs:
  generate-province-map:
    strategy:
      matrix:
        # 列出你要处理的所有省份（代码与 Geofabrik 子目录一致）
        province: [
          beijing, shanghai, guangdong, zhejiang, jiangsu,
          fujian, shandong, hebei, henan, sichuan,
          hubei, hunan, liaoning, anhui, jiangxi,
          shaanxi, heilongjiang, yunnan, guangxi, jilin,
          shanxi, gansu, guizhou, hainan, ningxia,
          qinghai, xinjiang, tibet, hong-kong, macau,
          taiwan, inner-mongolia, chongqing
          # 注意：Inner Mongolia 是中国的一个自治区，位于北部，不是省份
        ]
      # 可选：限制最大并发数，避免消耗过多资源
      max-parallel: 5

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool tilemaker gdal-bin

      - name: Download OSM data for ${{ matrix.province }}
        run: |
          wget https://download.geofabrik.de/asia/china/${{ matrix.province }}-latest.osm.pbf -O input.osm.pbf

      - name: Generate vector tiles with Tilemaker
        run: |
          tilemaker input.osm.pbf \
            --output ${{ matrix.province }}.mbtiles \
            --config config.json \
            --process process.lua

      - name: Extract POI database (optional)
        run: |
          ogr2ogr -f SQLITE -dsco SPATIALITE=YES ${{ matrix.province }}_pois.sqlite input.osm.pbf points

      - name: Package files
        run: |
          tar -czf ${{ matrix.province }}-map-$(date +'%Y%m%d').tar.gz ${{ matrix.province }}.mbtiles ${{ matrix.province }}_pois.sqlite

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          # 为每个省份创建单独的 release（用省份名作为 tag 前缀）
          tag_name: ${{ matrix.province }}-data-${{ github.run_number }}
          name: "${{ matrix.province }} Map Data Update ${{ github.run_number }}"
          body: |
            Auto-updated map data for ${{ matrix.province }} from OSM.
            - Date: ${{ github.event.repository.updated_at }}
            - Source: Geofabrik China Extract
          files: ${{ matrix.province }}-map-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}